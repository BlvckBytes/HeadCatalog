# Error messages used when a command failed to execute
commandErrorMessages: &commandErrorMessages
  malformedDouble$: 'lut["prefix"] & "&7The value &c" & value & " &7is not a valid &cdouble"'
  malformedFloat$: 'lut["prefix"] & "&7The value &c" & value & " &7is not a valid &cfloat"'
  malformedLong$: 'lut["prefix"] & "&7The value &c" & value & " &7is not a valid &clong"'
  malformedInteger$: 'lut["prefix"] & "&7The value &c" & value & " &7is not a valid &cinteger"'
  malformedUuid$: 'lut["prefix"] & "&7The value &c" & value & " &7is not a valid &cUUID"'

  # constants: List<String> - Enumeration constant names available
  malformedEnum$: |
    lut["prefix"] & "&7The value &c" & value & " &7is not one of (" &
    iter_cat(constant_names, (constant_name) => "&c" & constant_name, "&7, ", "&cNo values available") &
    "&7)"

  notAPlayer$: 'lut["prefix"] & "&7This command can only be executed as a &cplayer"'
  playerUnknown$: 'lut["prefix"] & "&7The player &c" & value & " &7has &cnot played &7on this server before"'
  playerNotOnline$: 'lut["prefix"] & "&7The player &c" & value & " &7is &cnot online"'

  internalError$: 'lut["prefix"] & "&4An internal error occurred"'

command:
  name: "headcatalog"
  aliases:
    - hc
  description: Opens the head catalog
  errorMessages: *commandErrorMessages

permissions:
  missingMessage$: 'lut["prefix"] & "&7You\sre lacking the permission &c" & permission'
  nodes:
    open: headcatalog.open
    request: headcatalog.request

# Chat messages which are possibly sent to the user
messages:
  headsNotReadyYet$: 'lut["prefix"] & "&cThe heads are still loading..."'
  inventoryFull$: 'lut["prefix"] & "&cYou have no more space left in your inventory"'
  requestedHead$: 'lut["prefix"] & "&7You received the head &d" & head.name'

# Items which are common to multiple UIs that are defined once
# and then linked by making use of YAML anchors
# See: https://support.atlassian.com/bitbucket-cloud/docs/yaml-anchors/
commonItems:

  # viewer_name: String - Name of the player viewing the inventory
  # current_page: Integer - Current page index
  # page_size: Integer - Size of a page in slots
  # number_of_pages: Integer - Number of total pages available
  # number_of_pageables: Integer - Number of items to page through

  previousPage: &previousPage
    type: PLAYER_HEAD
    textures$: 'lut[if current_page > 1 then "ARROW_LEFT" else "ARROW_LEFT_RED"]'
    name$: '"&8┬╗ " & (if current_page > 1 then "&dPrevious Page" else "&cNo Previous Page") & " &8┬½"'
    lore$:
      - '" "'
      - |
        if current_page > 1 then list_of(
          "&8ŌŚÅ &7Left click: &dPrevious Page",
          "&8ŌŚÅ &7Right click: &dFirst Page"
        ) else list_of(
          "&8ŌŚÅ &7Already on the &cfirst &7page"
        )

  currentPage: &currentPage
    type: PAPER
    name$: '"&8┬╗ &dPage &5" & current_page & "&7/&5" & max(1, number_of_pages) & " &8┬½"'
    lore$:
      - '" "'
      - '"&8ŌŚÅ &7Page size: &d" & page_size'
      - '"&8ŌŚÅ &7Items total: &d" & number_of_pageables'

  nextPage: &nextPage
    type: PLAYER_HEAD
    textures$: 'lut[if current_page < number_of_pages then "ARROW_RIGHT" else "ARROW_RIGHT_RED"]'
    name$: '"&8┬╗ " & (if current_page < number_of_pages then "&dNext Page" else "&cNo Next Page") & " &8┬½"'
    lore$:
      - '" "'
      - |
        if current_page < number_of_pages then list_of(
          "&8ŌŚÅ &7Left click: &dNext Page",
          "&8ŌŚÅ &7Right click: &dLast Page"
        ) else list_of(
          "&8ŌŚÅ &7Already on the &clast &7page"
        )

# Shown when the viewer wants to search through items of a single choice UI
anvilSearchUI:
  animating: true

  # Time in ticks which have to elapse after a key press in order to update the
  # results. This debounces keystrokes and helps to avoid calculating unnecessary
  # intermediate results which are overridden by the next keystroke anyways.
  searchDebounceTicks: 5

  # previous_title: String - Title of the previous inventory that initiated searching
  title: '&5Search HeadCatalog'

  # filters: Map<String, Boolean> - Map of filter names to their active state
  filter:
    type: HOPPER
    name: '&8┬╗ &dFilter &8┬½'
    lore$:
      - '" "'
      - |
        map(filters, (entry) => (
          "&8Ō×ź " & (if value(entry) then "&d" else "&7") & lut["headFilters"][key(entry)]
        ), "&cNo filters provided")
      - '" "'
      - '"&8ŌŚÅ &7Click to &dcycle &7through filters"'

  back:
    type: PLAYER_HEAD
    textures$: 'lut["DOUBLE_ARROW_LEFT"]'
    name: '&8┬╗ &dBack &8┬½'
    lore:
      - ' '
      - '&8ŌŚÅ &dExit &7from this screen'

  searchItem:
    type: PURPLE_TERRACOTTA
    # The name should always be blank in order to allow for an empty input box
    name: ' '
    lore:
      - ' '
      - '&8ŌŚÅ &7Type ahead to &dsearch &7for results'

  resultItem:
    type: PURPLE_TERRACOTTA
    name: '&8┬╗ &dSearch Query &8┬½'
    lore$:
      - '" "'
      - '"&8ŌŚÅ &7Your query: &d" & search_text'

  previousPage: *previousPage
  currentPage: *currentPage
  nextPage: *nextPage

  paginationSlots$: 'range(inventory_size, inventory_size + 26)'

  customItems:
    darkGlass:
      type: BLACK_STAINED_GLASS_PANE
      name: ' '

  slotContents:
    previousPage$: 'inventory_size + 29'
    currentPage$: 'inventory_size + 31'
    nextPage$: 'inventory_size + 33'
    filter$: 'inventory_size + 35'
    searchItem: 0
    back: 1
    resultItem: 2
    darkGlass$: |
      list_of(
        inventory_size + 27,
        inventory_size + 28,
        inventory_size + 30,
        inventory_size + 32,
        inventory_size + 34,
        inventory_size + 35
      )

singleChoiceUI:
  animating: true

  search:
    type: NAME_TAG
    name: '&8┬╗ &dSearch &8┬½'
    lore:
      - ' '
      - '&8ŌŚÅ &7Search through items in &drealtime'

  previousPage: *previousPage
  currentPage: *currentPage
  nextPage: *nextPage

  paginationSlots$: |
    flatten(
      range(10, 16),
      range(19, 25),
      range(28, 34)
    )

  numberOfRows: 5

  title: '&5HeadCatalog'

  border:
    type: BLACK_STAINED_GLASS_PANE

  customItems:
    darkGlass:
      type: BLACK_STAINED_GLASS_PANE
      name: ' '

  slotContents:
    previousPage: 38
    currentPage: 40
    nextPage: 42
    search: 44
    darkGlass$: |
      flatten(
        range(0, 8),
        list_of(9, 18, 27, 17, 26, 35),
        range(36, 44)
      )

gui:
  representative:
    type: PLAYER_HEAD
    textures$: 'skin_url_to_base64(head.skinUrl)'
    name$: '"&8┬╗ &d" & head.name & " &8┬½"'
    lore$:
      - '" "'
      - '"&7Categories:"'
      - 'map(head.categories, (category) => "&8Ō×ź &d" & title_case(category), "&cNo Categories")'
      - '" "'
      - '"&7Tags:"'
      - 'map(head.tags, (tag) => "&8Ō×ź &d" & title_case(tag), "&cNo Tags")'
      - '" "'
      - '"&7Updated: &d" & date_format(head.lastUpdate, "date", lut["dateFormat"])'
      - '" "'
      - '"&7Click to &dreceive &7this head"'

source:
  # Every 24h will be the minimum value accepted
  updatePeriodSeconds: 86400
  apis:
    -
      # Each of these URLs will be ran through the extractor and mapper below
      urls:
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=alphabet'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=animals'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=blocks'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=decoration'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=food-drinks'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=humans'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=humanoid'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=miscellaneous'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=monsters'
        - 'https://minecraft-heads.com/scripts/api.php?tags=true&cat=plants'

      # The user agent header to apply when performing requests
      userAgent: 'Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.11 (KHTML, like Gecko) Chrome/23.0.1271.95 Safari/537.11'

      # Endpoint type, currently supported: JSON
      dataType: JSON

      # Extracts the array from the response given by the API at the current URL
      # result - Result given by the API
      arrayExtractor$: 'result'

      # Maps each entry within the array to a internal head model
      # make_head(name: String, skinUrl: String, categories: Collection, tags: Collection, uuid: String): HeadModel
      # item - Current item of the array extracted by the arrayExtractor
      # url - Current URL in the list of URLs
      itemMapper$: |
        make_head(
          item["name"],
          base64_to_skin_url(item["value"]),
          item["uuid"],
          list_of(substring(url, r_index(url, "=") + 1)),
          split(item["tags"], ",")
        )

